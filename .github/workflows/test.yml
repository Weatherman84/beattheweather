name: Test
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check app.py src tests --output-format=github
      - run: pytest -q
