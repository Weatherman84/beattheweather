name: 2 - Collect current forecasts
on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - run: python -m weatherman.cli collect
        env:
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
      - name: Persist database snapshot
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f data/weatherman.db
          git diff --cached --quiet || git commit -m "data: collect forecasts"
          git push
