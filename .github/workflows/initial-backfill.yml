name: 1 - Initial history backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of historical days"
        required: true
        default: "365"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Weatherman
        run: pip install .

      - name: Download historical data
        run: python -m weatherman.cli backfill --days ${{ inputs.days }}

      - name: Save historical database in repository
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f data/weatherman.db
          git diff --cached --quiet || git commit -m "data: initial historical backfill"
          git push
